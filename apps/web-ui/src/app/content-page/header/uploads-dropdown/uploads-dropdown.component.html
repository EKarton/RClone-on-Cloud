<div class="dropdown dropdown-end">
  <label tabindex="0" class="btn btn-circle btn-ghost relative" aria-label="Uploads">
    <!-- Spinner ring -->
    @if (hasOngoingUploads$ | async) {
      <span
        class="loading loading-spinner loading-xl absolute inset-0 m-auto text-primary"
        aria-hidden="true"
      >
      </span>
    }

    <!-- Upload icon -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      class="size-5 relative z-10"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 16V4" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M8 8l4-4 4 4" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 20h16" />
    </svg>
  </label>

  <div
    tabindex="0"
    class="dropdown-content z-[1] menu mt-2 rounded-box border border-base-300 bg-base-300 p-2 shadow-lg"
  >
    <div class="flex flex-col gap-2">
      @for (uploadingFile of uploadingFiles$ | async; track uploadingFile.key) {
        @if (uploadingFile.result | hasSucceeded) {
          <span class="flex items-center gap-2 text-success pr-2">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
              />
            </svg>
            <span class="whitespace-nowrap">{{ uploadingFile.fileName }}</span>
          </span>
        } @else if (uploadingFile.result | isPending) {
          <span class="flex items-center gap-2">
            <span class="loading loading-spinner size-5"></span>
            <span class="whitespace-nowrap">{{ uploadingFile.fileName }}</span>
          </span>
        } @else {
          <span class="flex items-center gap-2 text-error">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"
              />
            </svg>
            <span class="whitespace-nowrap">{{ uploadingFile.fileName }}</span>
          </span>
        }
      }
    </div>
  </div>
</div>
