<app-folder-breadcrumbs />

<div class="mb-6 flex items-center justify-end gap-2">
  @if (filesListViewOption() === ListViewOptions.LIST) {
    <app-folder-sort-dropdown [(sortBy)]="filesSortBy" />
  }
  <app-folder-display-dropdown [(listViewOption)]="filesListViewOption" />
</div>
<div class="mb-4xl">
  @if (filesListViewOption() === ListViewOptions.TABLE) {
    <app-folder-list-table [contentsResult]="contentsResult()" />
  } @else {
    <app-folder-list-cards
      [sortBy]="filesSortBy()"
      [contentsResult]="contentsResult()"
    />
  }
</div>
